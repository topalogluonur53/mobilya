version: "3.8"

services:
  app:
    image: ghcr.io/topalogluonur53/mobilya:latest
    container_name: CAD_Planlayici
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      # CasaOS kalıcı alan (önerilen)
      - /DATA/AppData/cad_planlayici/db.sqlite3:/app/db.sqlite3
      - /DATA/AppData/cad_planlayici/static:/app/static

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: app
  title:
    custom: CAD Planlayıcı
  description:
    en: Kitchen Cabinet Planning & Cutlist App
    tr: Mutfak Dolabı Planlama ve Kesim Listesi Uygulaması
  icon: "https://cdn-icons-png.flaticon.com/512/3052/3052210.png"
  category: "Utilities"
  author: "onur topaloglu"
