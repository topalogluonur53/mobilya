            async function export2DAsImage() {
                const svgEl =
                    document.querySelector('#drawing-area svg');
                if (!svgEl) return showAlert("Dışa aktarmak için bir plan bulunamadı.");

                try {
                    showAlert("Görsel hazırlanıyor...", true);

                    // SVG'yi kopyala ve stil değişkenlerini içine göm (export sırasında renklerin kaybolmaması için)
                    const clonedSvg = svgEl.cloneNode(true);
                    const style =
                        document.createElementNS("http://www.w3.org/2000/svg",
                            "style");

                    const cabColor =
                        (getComputedStyle(document.documentElement).getPropertyValue('--cab-color')
                            || '#ffffff').trim();
                    const handleColor =
                        (getComputedStyle(document.documentElement).getPropertyValue('--handle-color')
                            || '#334155').trim();

                    // Dış CSS'teki stilleri SVG içine gömüyoruz çünkü Blob nesnesi dış CSS'i göremiyor
                    style.textContent = `
                                                                        .cab-base, .cab-wall { fill: ${cabColor};
                                                                        stroke: #94a3b8; stroke-width: 1.5; }
                                                                        .cab-filler { fill: #f1f5f9; stroke: #94a3b8;
                                                                        stroke-width: 1; stroke-dasharray: 4; }
                                                                        .cab-appl { fill: #e2e8f0; stroke: #64748b;
                                                                        stroke-width: 2; }
                                                                        .text-label { font-family: 'Inter', sans-serif;
                                                                        font-weight: 600; fill: #475569; }
                                                                        svg { background: white; }
                                                                        rect[fill="var(--handle-color)"],
                                                                        rect[fill^="var(--handle-color)"] { fill:
                                                                        ${handleColor}; }
                                                                        `;

                    // Kulp renklerini doğrudan elemanlara da basabiliriz(daha güvenli)
                    clonedSvg.querySelectorAll('[fill="var(--handle-color)"]').forEach(el =>
                        el.setAttribute('fill', handleColor));

                    clonedSvg.insertBefore(style,
                        clonedSvg.firstChild);

                    const svgData = new
                        XMLSerializer().serializeToString(clonedSvg);
                    const canvas = document.createElement("canvas");
                    const svgSize = svgEl.getBoundingClientRect();

                    // HD için 3 kat ölçeklendir
                    const scale = 3;
                    canvas.width = svgSize.width * scale;
                    canvas.height = svgSize.height * scale;

                    const ctx = canvas.getContext("2d");
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const img = new Image();
                    const svgBlob = new Blob([svgData], {
                        type:
                            "image/svg+xml;charset=utf-8"
                    });
                    const url = URL.createObjectURL(svgBlob);

                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, canvas.width,
                            canvas.height);
                        const pngUrl = canvas.toDataURL("image/png");
                        const downloadLink =
                            document.createElement("a");
                        downloadLink.href = pngUrl;
                        downloadLink.download =
                            `${project.name}_teknik_plan.png`;
                        document.body.appendChild(downloadLink);
                        downloadLink.click();
                        document.body.removeChild(downloadLink);
                        URL.revokeObjectURL(url);
                        showAlert("HD Plan İndirildi", true);
                    };
                    img.src = url;
                } catch (e) {
                    console.error("Export Error:", e);
                    showAlert("Dışa aktarma hatası: " + e.message);
                }
            }

            async function exportCutlistToPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                doc.setFont("helvetica", "bold");
                doc.setFontSize(18);
                doc.text(`${project.name} - Kesim Listesi`, 14,
                    20);

                doc.setFontSize(10);
                doc.setFont("helvetica", "normal");
                doc.text(`Tarih: ${new
                    Date().toLocaleDateString()}`, 14, 28);
                doc.text(`Malzeme: MDF 18mm`, 14, 34);

                const parts = await
                    apiRequest(`/api/projects/${projectId}/cutlist/`);

                let y = 50;
                const headers = ["Dolap", "Parça", "Adet", "Ölçü (BxE)", "Kal."];
                const colWidths = [45, 60, 15, 40, 15];

                // Header background
                doc.setFillColor(79, 70, 229); // Primary color
                doc.rect(14, y - 6, 180, 8, 'F');
                doc.setTextColor(255, 255, 255);

                let x = 14;
                headers.forEach((h, i) => {
                    doc.text(h, x, y);
                    x += colWidths[i];
                });

                doc.setTextColor(15, 17, 42); // Main text
                y += 10;

                parts.forEach((p, idx) => {
                    if (y > 280) {
                        doc.addPage();
                        y = 20;
                    }

                    let cx = 14;
                    const row = [p.cabinet, p.part_name,
                    p.qty.toString(), `${p.length}x${p.width}`,
                    p.thickness.toString()];

                    // Zebra stripes
                    if (idx % 2 === 0) {
                        doc.setFillColor(248, 250, 252);
                        doc.rect(14, y - 5, 180, 7, 'F');
                    }

                    row.forEach((txt, i) => {
                        doc.text(txt, cx, y);
                        cx += colWidths[i];
                    });
                    y += 8;
                });

                doc.save(`${project.name}_kesim_listesi.pdf`);
                showAlert("PDF İndirildi", true);
            }

            let selectedApplPopover = null;
            function openApplEditPopover(appl) {
                showToolSidebar();
                document.getElementById('appl-edit-popover').style.display
                    = 'block';
                document.getElementById('edit-popover').style.display
                    = 'none';
                document.getElementById('cab-ctx').style.display
                    = 'none'; // Only show appliance tools

                document.getElementById('appl-pop-width').value
                    = appl.width_mm;
                document.getElementById('appl-pop-height').value
                    = appl.height_mm || '';

                document.getElementById('appl-pop-save').onclick
                    = async () => {
                        const newWidth =
                            parseInt(document.getElementById('appl-pop-width').value);
                        const hInput =
                            document.getElementById('appl-pop-height').value;
                        const newHeight = hInput === '' ? null :
                            parseInt(hInput);

                        if (!newWidth) return;

                        try {
                            await saveHistoryState(); // Keep this for
                            history

                            // If it's an oven, update paired hood width too
                            // If it's a hood, update paired oven width too
                            let pairedApplId = null;
                            if (appl.type === 'OVEN') {
                                const pair = appliances.find(a => a.segment ===
                                    appl.segment && a.type === 'HOOD' && a.start_mm
                                    === appl.start_mm);
                                if (pair) pairedApplId = pair.id;
                            } else if (appl.type === 'HOOD') {
                                const pair = appliances.find(a => a.segment ===
                                    appl.segment && a.type === 'OVEN' && a.start_mm
                                    === appl.start_mm);
                                if (pair) pairedApplId = pair.id;
                            }

                            await apiRequest(`/api/appliances/${appl.id}/`,
                                'PATCH', {
                                width_mm: newWidth,
                                height_mm: newHeight
                            });

                            if (pairedApplId) {
                                await
                                    apiRequest(`/api/appliances/${pairedApplId}/`,
                                        'PATCH', { width_mm: newWidth });
                            }

                            document.getElementById('appl-edit-popover').style.display
                                = 'none';
                            hideToolSidebar();
                            await
                                apiRequest(`/api/projects/${projectId}/generate/`,
                                    'POST');
                            await reloadData();
                        } catch (err) {
                            showAlert(err.message);
                        }
                    };
            }

                    const sel =
                        document.getElementById('saved-projects-list');
                    const pName =

                    const pid =
                        document.getElementById('saved-projects-list').value;
                    if (!pid) return showAlert('Lütfen bir proje seçin.');

                    try {
                        projectId = pid;
                        await reloadData();

                        if (project) {
                            activateWorkspacePanels();
                            document.getElementById('toolbar').style.display
                                = 'flex';
                            document.getElementById('current-project-title').textContent

                            if (project.layout_type === 'L') {

                                document.getElementById('seg-len-b').required =

                            } else {
                                document.getElementById('group-seg-b').style.display
                                    = 'none';
                                document.getElementById('seg-len-b').required =
                                    false;
                            }

                            showAlert(project.name + ' yüklendi.', true);

                    } catch (e) {
                        console.error('Project load sequence error:',

                        showAlert('Proje yüklenirken bir hata oluştu: '
                            + e.message);
                    }
                });

            document.getElementById('btn-edit-project').addEventListener('click',
                async () => {
                    const pid =
                        document.getElementById('saved-projects-list').value;
                    if (!pid) return showAlert('Lütfen düzenlemek için bir proje seçin.');

                    const sel =
                        document.getElementById('saved-projects-list');
                    const currentName = sel.options[sel.selectedIndex].text.split(' (')[0];
                    const newName = prompt('Yeni proje adını girin: ', currentName);

                    if (newName && newName.trim() !== '' && newName
                        !== currentName) {
                        try {
                            await apiRequest(`/api/projects/${pid}/`,
                                'PATCH', { name: newName });
                            await loadProjectsList();
                            if (projectId == pid)
                                document.getElementById('current-project-title').textContent
                                    = newName;
                            showAlert('Proje adı güncellendi.', true);
                        } catch (e) {
                            showAlert('Güncellenirken hata oluştu.');
                        }
                    }
                });

            document.getElementById('btn-delete-project').addEventListener('click',
                async () => {
                    const pid =
                        document.getElementById('saved-projects-list').value;
                    if (!pid) return showAlert('Lütfen silmek için bir proje seçin.');

                    if (confirm('Bu projeyi tamamen silmek istediğinize emin misiniz? Bu işlem geri alınamaz!')) {
                        try {
                            await apiRequest(`/api/projects/${pid}/`,
                                'DELETE');
                            await loadProjectsList();
                            if (projectId == pid) {
                                location.reload(); // Reload page if currently active project is deleted
                            } else {
                                showAlert('Proje silindi.', true);
                            }
                        } catch (e) {
                            showAlert('Silinirken hata oluştu.');
                        }
                    }
                });

            // ---------------- PAN & ZOOM SETUP ----------------
            const v2d = document.getElementById('view-2d');
            v2d.addEventListener('wheel', e => {
                if (!v2d.classList.contains('active')) return;
                e.preventDefault();
                const zoomStep = 0.05;
                if (e.deltaY < 0) panZoomState.zoom += zoomStep;
                else panZoomState.zoom -= zoomStep;
                panZoomState.zoom = Math.max(0.2,
                    Math.min(panZoomState.zoom, 5));
                applyPanZoom();
            }, { passive: false });
            v2d.addEventListener('mousedown', e => {
                if (e.button !== 1) return; // Sadece orta tuş (tekerleğe basarak)
                e.preventDefault();
                if (e.target.closest('.cab-appl') ||
                    e.target.closest('.interact-dim') ||
                    e.target.closest('button') ||
                    e.target.closest('#cab-ctx') ||
                    e.target.closest('#edit-popover')) return;
                panZoomState.isPanning = true;
                panZoomState.startX = e.clientX -
                    panZoomState.panX;
                panZoomState.startY = e.clientY -
                    panZoomState.panY;
                v2d.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', e => {
                if (panZoomState.isPanning) {
                    panZoomState.panX = e.clientX -
                        panZoomState.startX;
                    panZoomState.panY = e.clientY -
                        panZoomState.startY;
                    applyPanZoom();
                }
            });

            document.addEventListener('mouseup', e => {
                if (panZoomState.isPanning) {
                    panZoomState.isPanning = false;
                    v2d.style.cursor = 'default';
                }
            });

            // Color Picker Logic
            document.getElementById('cabinet-color-picker').addEventListener('click',
                (e) => {
                    const btn = e.target.closest('.color-btn');
                    if (!btn) return;

                    document.querySelectorAll('.color-btn').forEach(b =>
                        b.classList.remove('active'));
                    btn.classList.add('active');

                    currentCabinetColor = btn.dataset.hex;
                    currentHandleColor = btn.dataset.handle;

                    // Update CSS variables for 2D
                    document.documentElement.style.setProperty('--cab-color',
                        currentCabinetColor);
                    document.documentElement.style.setProperty('--handle-color',
                        currentHandleColor);

                    // Redraw
                    draw2D();
                    if
                        (document.getElementById('view-3d').classList.contains('active')) {
                        init3D();
                    }
                });

            loadProjectsList();
        </script>
